<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharpix AI - Trình Tạo Mã Bản Quyền</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0e12;
      --panel: #161820;
      --primary: #5d5fef;
      --primary-hover: #484be3;
      --secondary: #ff708a;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: #242835;
      --accent: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Background glow decorations */
    .glow-1 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(93, 95, 239, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      top: -100px;
      left: -100px;
      z-index: 1;
      pointer-events: none;
    }

    .glow-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 112, 138, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
      bottom: -150px;
      right: -150px;
      z-index: 1;
      pointer-events: none;
    }

    .container {
      background-color: var(--panel);
      width: 100%;
      max-width: 650px;
      border-radius: 24px;
      border: 1px solid var(--border);
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    header {
      text-align: center;
      margin-bottom: 35px;
    }

    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .logo-container img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(93, 95, 239, 0.3);
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #a5b4fc, #5d5fef);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    header p {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .tab-btn {
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab-btn:hover {
      background-color: rgba(255, 255, 255, 0.03);
      color: var(--text);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, rgba(93, 95, 239, 0.2) 0%, rgba(93, 95, 239, 0.05) 100%) !important;
      border: 1px solid var(--primary) !important;
      color: var(--text) !important;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-wrapper {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    select,
    input[type="number"] {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      padding: 14px 20px;
      width: 100%;
      outline: none;
      transition: all 0.3s ease;
    }

    option {
      background-color: #13141f;
      color: #ffffff;
    }

    select:focus,
    input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(93, 95, 239, 0.2);
    }

    .btn {
      background: linear-gradient(135deg, var(--primary), #4c4ee0);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 28px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 16px rgba(93, 95, 239, 0.25);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(93, 95, 239, 0.35);
    }

    .btn:active {
      transform: translateY(0);
      scale: 0.98;
    }

    .btn-rocket {
      display: inline-block;
      transition: transform 0.3s ease-out;
      transform: rotate(45deg);
    }

    .btn:hover .btn-rocket {
      transform: rotate(0deg);
    }

    .results-panel {
      margin-top: 35px;
      border-top: 1px solid var(--border);
      padding-top: 30px;
      display: none;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .results-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .btn-copy-all {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-copy-all:hover {
      background-color: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .key-list {
      max-height: 300px;
      overflow-y: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      background-color: rgba(0, 0, 0, 0.2);
    }

    .key-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background-color 0.2s ease;
    }

    .key-item:last-child {
      border-bottom: none;
    }

    .key-item:hover {
      background-color: rgba(255, 255, 255, 0.02);
    }

    .key-text {
      font-family: monospace;
      font-size: 15px;
      font-weight: 700;
      color: #cbd5e1;
      letter-spacing: 0.5px;
    }

    .btn-copy-single {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .btn-copy-single:hover {
      color: #818cf8;
      text-decoration: underline;
    }

    /* Scrollbar Styling */
    .key-list::-webkit-scrollbar {
      width: 6px;
    }

    .key-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .key-list::-webkit-scrollbar-thumb {
      background-color: var(--border);
      border-radius: 3px;
    }

    /* Toast Alert Notification */
    .toast {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background-color: var(--accent);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
      z-index: 100;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="container">
    <header>
      <div class="logo-container">
        <img src="renderer/public/sharpix_logo_icon.png" alt="Sharpix AI Logo"
          onerror="this.src='https://sharpix.me/logo.png'">
        <h1>Sharpix AI</h1>
      </div>
      <p>Trình tạo khóa kích hoạt bảo mật ngoại tuyến chính thức dành cho Quản trị viên</p>
    </header>

    <!-- Tab navigation -->
    <div
      style="display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
      <button id="tab-hwid-btn" class="tab-btn active"
        style="flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: rgba(93, 95, 239, 0.15); color: var(--primary); font-weight: 700; cursor: pointer; transition: all 0.3s;">🔑
        Khóa Theo Máy (HWID)</button>
      <button id="tab-random-btn" class="tab-btn"
        style="flex: 1; padding: 12px; border: 1px solid transparent; border-radius: 10px; background: transparent; color: var(--text-muted); font-weight: 700; cursor: pointer; transition: all 0.3s;">🎲
        Tạo Mã Chung</button>
    </div>

    <!-- Expiry Selector (Shared) -->
    <div class="form-group" style="margin-bottom: 25px;">
      <label for="expiry-select">Thời hạn sử dụng mã bản quyền</label>
      <select id="expiry-select"
        style="background-color: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 16px; font-weight: 600; padding: 14px 20px; width: 100%; outline: none;">
        <option value="PERM">Vĩnh Viễn (Lifetime)</option>
        <option value="1H">⏳ 1 Giờ (Dùng thử)</option>
        <option value="3D">📅 3 Ngày</option>
        <option value="1W">📅 1 Tuần</option>
        <option value="1M">📅 1 Tháng</option>
        <option value="3M">📅 3 Tháng</option>
        <option value="6M">📅 6 Tháng</option>
        <option value="1Y">📅 1 Năm</option>
        <option value="3Y">📅 3 Năm</option>
      </select>
    </div>

    <!-- HWID Mode Panel -->
    <div id="hwid-panel">
      <div class="form-group">
        <label for="hwid-input">Nhập Mã máy của Khách hàng (Hardware ID)</label>
        <div class="input-wrapper">
          <input type="text" id="hwid-input" placeholder="Ví dụ: SHARPIX-HWID-87FA92"
            style="background-color: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 16px; font-weight: 600; padding: 14px 20px; width: 100%; outline: none; text-align: center; text-transform: uppercase; letter-spacing: 0.5px;">
        </div>
      </div>
      <button class="btn" id="btn-generate-hwid">
        Tạo mã kích hoạt cho máy này
        <span class="btn-rocket">🚀</span>
      </button>
    </div>

    <!-- Random Mode Panel -->
    <div id="random-panel" style="display: none;">
      <div class="form-group">
        <label for="key-count">Số lượng khóa bản quyền cần tạo</label>
        <div class="input-wrapper">
          <input type="number" id="key-count" min="1" max="100" value="5">
        </div>
      </div>
      <button class="btn" id="btn-generate-random">
        Tạo mã kích hoạt chung ngẫu nhiên
        <span class="btn-rocket">🎲</span>
      </button>
    </div>

    <div class="results-panel" id="results-panel">
      <div class="results-header">
        <span class="results-title" id="results-title">Danh Sách Mã Bản Quyền</span>
        <button class="btn-copy-all" id="btn-copy-all">Sao chép tất cả</button>
      </div>
      <div class="key-list" id="key-list">
        <!-- Generated keys will be injected here -->
      </div>
    </div>

    <!-- History Panel -->
    <div class="card" id="history-card"
      style="margin-top: 30px; display: none; background: rgba(30, 30, 50, 0.4); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); backdrop-filter: blur(10px);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px;">
        <h2
          style="margin: 0; font-size: 18px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px;">
          📜 Lịch Sử Đã Tạo Khóa</h2>
        <button id="btn-clear-history"
          style="background: rgba(235, 87, 87, 0.1); color: #eb5757; border: 1px solid rgba(235, 87, 87, 0.2); border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.3s;">Xóa
          Lịch Sử</button>
      </div>
      <div style="margin-bottom: 15px;">
        <input type="text" id="history-search" placeholder="🔍 Tìm kiếm mã máy hoặc mã khóa..."
          style="background-color: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 10px 15px; width: 100%; outline: none; transition: all 0.3s;">
      </div>
      <div
        style="overflow-x: auto; max-height: 300px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.05);">
        <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 13px;">
          <thead>
            <tr
              style="border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 600; background: rgba(0, 0, 0, 0.2);">
              <th style="padding: 12px 10px;">Thời gian</th>
              <th style="padding: 12px 10px;">Loại Khóa</th>
              <th style="padding: 12px 10px;">Mã Máy (HWID)</th>
              <th style="padding: 12px 10px;">Thời Hạn</th>
              <th style="padding: 12px 10px;">Mã Kích Hoạt</th>
              <th style="padding: 12px 10px; text-align: right;">Hành động</th>
            </tr>
          </thead>
          <tbody id="history-table-body">
            <!-- Dynamic rows -->
          </tbody>
        </table>
      </div>

      <!-- Pagination Controls -->
      <div id="history-pagination" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.05); gap: 10px; flex-wrap: wrap;">
        <span id="pagination-info" style="color: var(--text-muted); font-size: 13px; font-weight: 600;">Đang hiện 0 - 0 của 0</span>
        <div style="display: flex; gap: 8px; align-items: center;">
          <button id="btn-prev-page" style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">◀ Trang trước</button>
          <button id="btn-next-page" style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;">Trang sau ▶</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Đã sao chép thành công!</div>

  <script>
    const SECRET_SALT = "SHARPIX_SECURE_ACTIVATION_SALT_2026_PRO_KEY";

    // Same mathematical hash function used by the App's lock screen
    function generateHash(input) {
      let hash = 0;
      const salted = input + SECRET_SALT;
      for (let i = 0; i < salted.length; i++) {
        hash = (hash << 5) - hash + salted.charCodeAt(i);
        hash |= 0; // Convert to 32bit integer
      }
      return Math.abs(hash).toString(36).toUpperCase().padStart(6, "0").slice(0, 6);
    }

    // Helper to generate a random 6-character alphanumeric string
    function generateRandomPart1() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // Removed confusing I, O, 0, 1 for premium clarity
      let result = "";
      for (let i = 0; i < 6; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    // Get mathematical expiry code
    function getExpiryCode() {
      const select = document.getElementById("expiry-select");
      const val = select.value;
      if (val === "PERM") return "PERM";

      const d = new Date();
      if (val === "1H") {
        d.setHours(d.getHours() + 1);
        const yy = String(d.getFullYear() % 100).padStart(2, "0");
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        const hh = String(d.getHours()).padStart(2, "0");
        return `${yy}${mm}${dd}${hh}`;
      }

      if (val === "3D") {
        d.setDate(d.getDate() + 3);
      } else if (val === "1W") {
        d.setDate(d.getDate() + 7);
      } else {
        let months = 0;
        if (val === "1M") months = 1;
        else if (val === "3M") months = 3;
        else if (val === "6M") months = 6;
        else if (val === "1Y") months = 12;
        else if (val === "3Y") months = 36;

        d.setMonth(d.getMonth() + months);
      }

      const yy = String(d.getFullYear() % 100).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yy}${mm}${dd}`;
    }

    // Generate a single unique random valid general key
    function createRandomActivationCode() {
      const part1 = generateRandomPart1();
      const expiry = getExpiryCode();
      const signature = generateHash(part1 + "-" + expiry + "_GENERAL_KEY_VALIDATION");
      return `SHARPIX-GEN-${part1}-${expiry}-${signature}`;
    }

    // Generate key from customer's Hardware ID
    function createHwidActivationCode(hwidInput) {
      if (!hwidInput) return null;
      let cleanInput = hwidInput.trim().toUpperCase();

      // Extract the 6-character/fallback part
      // E.g. "SHARPIX-HWID-87FA92" -> "87FA92"
      // E.g. "SHARPIX-HWID-FALLBACK-3D7E8F" -> "FALLBACK-3D7E8F"
      let parsedHash = cleanInput;
      if (cleanInput.includes("SHARPIX-HWID-")) {
        parsedHash = cleanInput.replace("SHARPIX-HWID-", "");
      }

      if (!parsedHash) return null;

      const expiry = getExpiryCode();
      const signature = generateHash(parsedHash + "-" + expiry);
      return `SHARPIX-${parsedHash}-${expiry}-${signature}`;
    }

    // Tab Switching
    const tabHwidBtn = document.getElementById("tab-hwid-btn");
    const tabRandomBtn = document.getElementById("tab-random-btn");
    const hwidPanel = document.getElementById("hwid-panel");
    const randomPanel = document.getElementById("random-panel");
    const resultsPanel = document.getElementById("results-panel");
    const keyList = document.getElementById("key-list");
    const toast = document.getElementById("toast");

    tabHwidBtn.addEventListener("click", () => {
      tabHwidBtn.className = "tab-btn active";
      tabRandomBtn.className = "tab-btn";
      hwidPanel.style.display = "block";
      randomPanel.style.display = "none";
      resultsPanel.style.display = "none";
      generatedCodes = [];
    });

    tabRandomBtn.addEventListener("click", () => {
      tabRandomBtn.className = "tab-btn active";
      tabHwidBtn.className = "tab-btn";
      randomPanel.style.display = "block";
      hwidPanel.style.display = "none";
      resultsPanel.style.display = "none";
      generatedCodes = [];
    });

    const btnGenerateHwid = document.getElementById("btn-generate-hwid");
    const btnGenerateRandom = document.getElementById("btn-generate-random");
    const keyCountInput = document.getElementById("key-count");
    const hwidInput = document.getElementById("hwid-input");

    let generatedCodes = [];

    // HWID Key Generation
    btnGenerateHwid.addEventListener("click", () => {
      const val = hwidInput.value;
      if (!val) {
        showToast("Vui lòng nhập Mã máy của khách hàng!");
        return;
      }

      const code = createHwidActivationCode(val);
      if (!code) {
        showToast("Mã máy không đúng định dạng!");
        return;
      }

      generatedCodes = [code];
      keyList.innerHTML = `
        <div class="key-item">
          <span class="key-text" style="color: #a7f3d0; font-size: 16px;">${code}</span>
          <button class="btn-copy-single" onclick="copySingle('${code}')">Sao chép</button>
        </div>
      `;

      resultsPanel.style.display = "block";
      showToast("Đã tạo mã kích hoạt khóa phần cứng thành công!");
      addKeyToHistory("HWID", val, code);
    });

    // Random Key Generation
    btnGenerateRandom.addEventListener("click", () => {
      let count = parseInt(keyCountInput.value) || 5;
      if (count < 1) count = 1;
      if (count > 100) count = 100;
      keyCountInput.value = count;

      generatedCodes = [];
      keyList.innerHTML = "";

      for (let i = 0; i < count; i++) {
        const code = createRandomActivationCode();
        generatedCodes.push(code);

        const keyItem = document.createElement("div");
        keyItem.className = "key-item";
        keyItem.innerHTML = `
          <span class="key-text">${code}</span>
          <button class="btn-copy-single" onclick="copySingle('${code}')">Sao chép</button>
        `;
        keyList.appendChild(keyItem);
        
        // Save each generated key to history
        addKeyToHistory("GENERAL", "Tất cả các máy", code);
      }

      resultsPanel.style.display = "block";
      showToast(`Đã tạo thành công ${count} mã bản quyền chung!`);
    });

    // Copy Single Code
    window.copySingle = function (code) {
      navigator.clipboard.writeText(code).then(() => {
        showToast("Đã sao chép: " + code);
      });
    };

    // Copy All Codes
    document.getElementById("btn-copy-all").addEventListener("click", () => {
      if (generatedCodes.length === 0) return;
      const textToCopy = generatedCodes.join("\n");
      navigator.clipboard.writeText(textToCopy).then(() => {
        showToast("Đã sao chép tất cả các mã vào Clipboard!");
      });
    });

    // Show Toast Notification
    function showToast(message) {
      toast.innerText = message;
      toast.classList.add("show");
      setTimeout(() => {
        toast.classList.remove("show");
      }, 2500);
    }

    // 📜 History Management Log Logic
    let keyHistory = [];
    let historyPage = 1;
    const historyPageSize = 10;

    function loadHistory() {
      try {
        const stored = localStorage.getItem("sharpix_gen_history");
        if (stored) {
          keyHistory = JSON.parse(stored);
        }
      } catch (e) {
        console.error("Failed to load history", e);
      }
      renderHistory();
    }

    function saveHistory() {
      try {
        localStorage.setItem("sharpix_gen_history", JSON.stringify(keyHistory));
      } catch (e) {
        console.error("Failed to save history", e);
      }
    }

    function addKeyToHistory(type, hwid, key) {
      const expirySelect = document.getElementById("expiry-select");
      const expiryLabel = expirySelect.options[expirySelect.selectedIndex].text;
      
      keyHistory.unshift({
        timestamp: new Date().toLocaleString("vi-VN"),
        type: type, // 'HWID' or 'GENERAL'
        hwid: hwid,
        expiry: expiryLabel,
        key: key
      });
      saveHistory();
      historyPage = 1; // Reset to page 1
      renderHistory();
    }

    function renderHistory() {
      const historyCard = document.getElementById("history-card");
      const tbody = document.getElementById("history-table-body");
      const searchVal = document.getElementById("history-search").value.toLowerCase();
      
      if (keyHistory.length === 0) {
        historyCard.style.display = "none";
        return;
      }
      
      historyCard.style.display = "block";
      tbody.innerHTML = "";
      
      const filtered = keyHistory.filter(item => {
        return item.hwid.toLowerCase().includes(searchVal) || 
               item.key.toLowerCase().includes(searchVal) ||
               item.expiry.toLowerCase().includes(searchVal);
      });
      
      const totalItems = filtered.length;
      
      if (totalItems === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 20px; color: var(--text-muted);">Không tìm thấy khóa nào khớp với tìm kiếm.</td></tr>`;
        document.getElementById("history-pagination").style.display = "none";
        return;
      }
      
      const totalPages = Math.ceil(totalItems / historyPageSize) || 1;
      if (historyPage > totalPages) historyPage = totalPages;
      if (historyPage < 1) historyPage = 1;
      
      const startIdx = (historyPage - 1) * historyPageSize;
      const endIdx = Math.min(startIdx + historyPageSize, totalItems);
      const pageItems = filtered.slice(startIdx, endIdx);
      
      // Update pagination UI
      document.getElementById("history-pagination").style.display = "flex";
      document.getElementById("pagination-info").innerText = `Đang hiển thị ${startIdx + 1} - ${endIdx} trong tổng số ${totalItems} khóa`;
      
      const prevBtn = document.getElementById("btn-prev-page");
      const nextBtn = document.getElementById("btn-next-page");
      
      if (historyPage === 1) {
        prevBtn.disabled = true;
        prevBtn.style.opacity = "0.4";
        prevBtn.style.cursor = "not-allowed";
      } else {
        prevBtn.disabled = false;
        prevBtn.style.opacity = "1";
        prevBtn.style.cursor = "pointer";
      }
      
      if (historyPage === totalPages) {
        nextBtn.disabled = true;
        nextBtn.style.opacity = "0.4";
        nextBtn.style.cursor = "not-allowed";
      } else {
        nextBtn.disabled = false;
        nextBtn.style.opacity = "1";
        nextBtn.style.cursor = "pointer";
      }
      
      pageItems.forEach((item) => {
        const typeBadge = item.type === "HWID" 
          ? `<span style="background: rgba(93, 95, 239, 0.15); color: var(--primary); padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 11px;">🔒 Khóa máy</span>`
          : `<span style="background: rgba(46, 204, 113, 0.15); color: #2ecc71; padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 11px;">🎲 Khóa chung</span>`;
        
        const tr = document.createElement("tr");
        tr.style.borderBottom = "1px solid rgba(255, 255, 255, 0.05)";
        tr.style.transition = "background 0.2s";
        tr.onmouseenter = () => tr.style.backgroundColor = "rgba(255, 255, 255, 0.02)";
        tr.onmouseleave = () => tr.style.backgroundColor = "transparent";
        
        tr.innerHTML = `
          <td style="padding: 12px 10px; color: var(--text-muted); white-space: nowrap;">${item.timestamp}</td>
          <td style="padding: 12px 10px;">${typeBadge}</td>
          <td style="padding: 12px 10px; font-weight: 600; color: #4fa8ff; font-family: monospace; letter-spacing: 0.5px;">${item.hwid}</td>
          <td style="padding: 12px 10px; font-weight: 600; color: #e0e0e0;">${item.expiry}</td>
          <td style="padding: 12px 10px; font-family: monospace; font-weight: bold; color: #ffffff; letter-spacing: 0.5px; user-select: all;">${item.key}</td>
          <td style="padding: 12px 10px; text-align: right;">
            <button class="btn-copy-item" data-key="${item.key}" style="background: rgba(93, 95, 239, 0.15); border: 1px solid rgba(93, 95, 239, 0.3); color: var(--primary); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s;">Sao chép 📋</button>
          </td>
        `;
        
        tr.querySelector(".btn-copy-item").addEventListener("click", function() {
          const keyText = this.getAttribute("data-key");
          navigator.clipboard.writeText(keyText);
          showToast("Đã sao chép khóa thành công!");
        });
        
        tbody.appendChild(tr);
      });
    }

    // Initialize History on Boot
    loadHistory();
    
    document.getElementById("history-search").addEventListener("input", () => {
      historyPage = 1; // Reset to page 1 on search
      renderHistory();
    });
    
    document.getElementById("btn-prev-page").addEventListener("click", () => {
      if (historyPage > 1) {
        historyPage--;
        renderHistory();
      }
    });
    
    document.getElementById("btn-next-page").addEventListener("click", () => {
      historyPage++;
      renderHistory();
    });
    
    document.getElementById("btn-clear-history").addEventListener("click", () => {
      if (confirm("Bạn có chắc chắn muốn xóa toàn bộ lịch sử tạo khóa?")) {
        keyHistory = [];
        saveHistory();
        renderHistory();
        showToast("Đã xóa toàn bộ lịch sử tạo khóa!");
      }
    });
  </script>
</body>

</html>
